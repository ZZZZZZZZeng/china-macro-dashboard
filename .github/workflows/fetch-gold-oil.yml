name: Fetch Gold & Oil Data

on:
  schedule:
    # 每天 UTC 22:00 (北京时间次日 06:00)
    - cron: '0 22 * * *'
  workflow_dispatch:  # 手动触发

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install akshare

      - name: Fetch gold & oil data
        run: |
          python scripts/fetch_gold_oil.py

      - name: Check for changes
        id: check_changes
        run: |
          git diff --exit-code public/data/gold_oil.json || echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/data/gold_oil.json
          git commit -m "data: update gold & oil data $(date '+%Y-%m-%d')"
          git push

      - name: Summary
        run: |
          echo "### 数据更新完成" >> $GITHUB_STEP_SUMMARY
          echo "时间: $(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_STEP_SUMMARY
          if [ -f public/data/gold_oil.json ]; then
            COUNT=$(cat public/data/gold_oil.json | python3 -c "import sys,json; print(len(json.load(sys.stdin).get('data', [])))")
            echo "数据条数: $COUNT" >> $GITHUB_STEP_SUMMARY
          fi
